<!DOCTYPE html>
<html>
<head>
    <title>Stock Analyzer Pro</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .box { margin-top: 50px; }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 8px;
        }

        .card {
            background: white;
            color: black;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 10px;
        }

        a { color: blue; }
    </style>
</head>
<body>

<div class="box">
    <h1>📊 Stock Analyzer PRO</h1>

    <form id="form">
        <input type="file" required>
        <button type="submit">Upload</button>
    </form>

    <div id="results"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    let fd = new FormData();
    fd.append("file", document.querySelector("input").files[0]);

    let res = await fetch("/upload/", {
        method: "POST",
        body: fd
    });

    let data = await res.json();

    let div = document.getElementById("results");
    div.innerHTML = "<h2>Results</h2>";

    data.results.forEach(r => {
        div.innerHTML += `
            <div class="card">
                <b>${r.cam}</b><br>
                Missing: ${r.count}<br>
                <a href="${r.file}">Download</a>
            </div>
        `;
    });

    div.innerHTML += `<br><a href="${data.zip}">⬇ Download ALL ZIP</a>`;
};
</script>

</body>
</html>
